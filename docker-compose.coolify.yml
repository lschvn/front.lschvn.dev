services:
  openfront:
    build:
      context: .
      dockerfile: Dockerfile.coolify
      args:
        GIT_COMMIT: ${SOURCE_COMMIT:-unknown}
    environment:
      GAME_ENV: ${GAME_ENV:-dev}
      GIT_COMMIT: ${SOURCE_COMMIT:-unknown}
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
